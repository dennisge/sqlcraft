name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit and Vet
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run unit tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  integration:
    name: Live DB Integration
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start MySQL and PostgreSQL
        run: docker compose -f testdata/live-db/compose.yaml up -d --wait

      - name: Run live provider checks
        run: go run ./cmd/livecheck

      - name: Stop databases
        if: always()
        run: docker compose -f testdata/live-db/compose.yaml down -v
